services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lyric
      POSTGRES_PASSWORD: lyric
      POSTGRES_DB: lyric
    ports:
      # Host port 5434 to avoid clashing with a local Postgres on 5432.
      # Inside the compose network the API still talks to db:5432.
      - "5434:5432"
    volumes:
      - lyric_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyric -d lyric"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      LYRIC_ASSISTANT_TOKEN: ${LYRIC_ASSISTANT_TOKEN:-dev-token}
      LYRIC_ASSISTANT_DATABASE_URL: postgresql+asyncpg://lyric:lyric@db:5432/lyric
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

volumes:
  lyric_pgdata:
